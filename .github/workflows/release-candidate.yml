name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to validate, matching pyproject.toml
        required: true
      commit_sha:
        description: Exact commit SHA to validate
        required: true
      accepted_regressions:
        description: Optional JSON file path with accepted benchmark regressions
        required: false
        default: ""
      benchmark_run_id:
        description: Optional successful Performance workflow run id to reuse benchmark evidence
        required: false
        default: ""

permissions:
  actions: read
  checks: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout candidate commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"
          activate-environment: true

      - name: Resolve and verify release metadata
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          python tools/validate_release_candidate.py metadata \
            --version "${REQUESTED_VERSION}" \
            --commit-sha "${REQUESTED_COMMIT_SHA}" \
            --github-env "${GITHUB_ENV}" \
            --fetch-origin-main \
            --require-origin-main

      - name: Verify CI workflow succeeded for candidate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh run list \
            --workflow CI \
            --commit "${CANDIDATE_COMMIT_SHA}" \
            --json conclusion,status,databaseId,url \
            --limit 20 \
            > /tmp/albucore-ci-runs.json
          python tools/validate_release_candidate.py ci-runs \
            --runs-json /tmp/albucore-ci-runs.json

      - name: Build distributions
        run: uv build

      - name: Install release validation dependencies
        run: uv sync --frozen --extra headless --group dev

      - name: Check public router contracts
        run: uv run python tools/check_router_contracts.py

      - name: Check CI matrix policy
        run: uv run python tools/ci_matrix.py check

      - name: Verify golden vectors
        run: uv run python tools/verify_golden_vectors.py

      - name: Run release property tests
        run: uv run pytest tests/property --hypothesis-profile=release

      - name: Check distribution metadata
        run: uv tool run --from twine twine check dist/*

      - name: Smoke test built wheel
        run: |
          VENV_DIR="$(mktemp -d /tmp/albucore-release-venv.XXXXXX)"
          trap 'rm -rf "$VENV_DIR"' EXIT
          python -m venv "$VENV_DIR"
          . "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip
          if [ -n "${HEADLESS_RUNTIME_DEPENDENCIES:-}" ]; then
            printf '%s\n' "${HEADLESS_RUNTIME_DEPENDENCIES}" > "$VENV_DIR/headless-runtime-requirements.txt"
            python -m pip install -r "$VENV_DIR/headless-runtime-requirements.txt"
          fi
          python -m pip install dist/*.whl
          cd /tmp
          python -c 'import albucore, numpy as np; img = np.zeros((64, 64, 3), dtype=np.uint8); print("albucore smoke test passed, version:", albucore.__version__)'

      - name: Verify uv.lock is up-to-date
        run: uv lock --check

      - name: Resolve previous published PyPI version
        run: |
          python tools/resolve_previous_pypi_release.py \
            --current-version "${PACKAGE_VERSION}" \
            --github-env "${GITHUB_ENV}"

      - name: Download reusable benchmark evidence
        if: ${{ inputs.benchmark_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: release-benchmark-evidence
          path: benchmark-evidence
          run-id: ${{ inputs.benchmark_run_id }}
          github-token: ${{ github.token }}

      - name: Verify reusable benchmark evidence
        if: ${{ inputs.benchmark_run_id != '' }}
        env:
          BENCHMARK_RUN_ID: ${{ inputs.benchmark_run_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh run view "${BENCHMARK_RUN_ID}" \
            --json conclusion,headSha,status,workflowName,url \
            > benchmark-evidence/benchmark-run.json
          python tools/validate_release_candidate.py benchmark-evidence \
            --evidence-dir benchmark-evidence \
            --dist-dir dist \
            --commit-sha "${CANDIDATE_COMMIT_SHA}" \
            --version "${PACKAGE_VERSION}" \
            --baseline-version "${PREVIOUS_RELEASE_VERSION}"

      - name: Run current release router benchmark
        if: ${{ inputs.benchmark_run_id == '' }}
        run: |
          uv run python benchmarks/benchmark_router_synthetic.py \
            --with-geometric \
            --repeats 7 \
            --warmup 2 \
            --benchmark-label "release-${PACKAGE_VERSION}" \
            --output-json dist/router-release.json

      - name: Run previous published release router benchmark baseline
        if: ${{ inputs.benchmark_run_id == '' }}
        run: |
          uv run --no-project \
            --with "albucore==${PREVIOUS_RELEASE_VERSION}" \
            --with opencv-python-headless \
            --with numkong \
            --with stringzilla \
            --with numpy \
            python benchmarks/benchmark_router_synthetic.py \
              --with-geometric \
              --repeats 7 \
              --warmup 2 \
              --benchmark-label "baseline-${PREVIOUS_RELEASE_VERSION}" \
              --output-json dist/router-baseline.json

      - name: Check release benchmark regressions
        if: ${{ inputs.benchmark_run_id == '' }}
        env:
          ACCEPTED_REGRESSIONS: ${{ inputs.accepted_regressions }}
        run: |
          if [ -n "${ACCEPTED_REGRESSIONS}" ]; then
            uv run python tools/check_benchmark_regressions.py \
              --baseline dist/router-baseline.json \
              --current dist/router-release.json \
              --mode release \
              --accepted-regressions "${ACCEPTED_REGRESSIONS}" \
              --output-md dist/router-release-regressions.md
          else
            uv run python tools/check_benchmark_regressions.py \
              --baseline dist/router-baseline.json \
              --current dist/router-release.json \
              --mode release \
              --output-md dist/router-release-regressions.md
          fi

      - name: Summarize release router benchmark
        if: ${{ always() && inputs.benchmark_run_id == '' }}
        run: |
          if [ -f dist/router-release.json ]; then
            uv run python tools/summarize_benchmarks.py \
              dist/router-release.json \
              --output-md dist/router-release-summary.md
          fi

      - name: Run memory smoke
        if: ${{ inputs.benchmark_run_id == '' }}
        run: uv run python tools/run_memory_smoke.py --output-json dist/memory-smoke.json

      - name: Export locked runtime dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file dist/runtime-requirements.txt

      - name: Generate CycloneDX SBOM
        run: |
          uv tool run --from cyclonedx-bom cyclonedx-py requirements dist/runtime-requirements.txt \
            --output-format JSON \
            --output-file "dist/${SBOM_FILENAME}"

      - name: Generate release candidate metadata
        run: |
          python tools/validate_release_candidate.py candidate-metadata \
            --dist-dir dist \
            --version "${PACKAGE_VERSION}" \
            --commit-sha "${CANDIDATE_COMMIT_SHA}" \
            --previous-pypi-version "${PREVIOUS_RELEASE_VERSION}"

      - name: Generate checksums
        run: |
          (
            cd dist
            files=(
              ./*.whl
              ./*.tar.gz
              ./*-sbom.cdx.json
              ./router-release.json
              ./router-baseline.json
              ./router-release-summary.md
              ./router-release-regressions.md
              ./memory-smoke.json
              ./runtime-requirements.txt
              ./release-candidate-metadata.json
            )
            if [ -f ./release-benchmark-metadata.json ]; then
              files+=(./release-benchmark-metadata.json)
            fi
            sha256sum "${files[@]}" > SHA256SUMS.txt
          )

      - name: Generate release summary
        run: |
          uv run python tools/generate_release_summary.py \
            --version "${PACKAGE_VERSION}" \
            --dist-dir dist \
            --output-md "dist/albucore-${PACKAGE_VERSION}-release-summary.md"
          (
            cd dist
            sha256sum ./albucore-*-release-summary.md >> SHA256SUMS.txt
          )

      - name: Write release candidate step summary
        if: always()
        run: |
          {
            echo "## Release Candidate"
            echo
            echo "- Version: ${PACKAGE_VERSION:-unknown}"
            echo "- Commit: ${CANDIDATE_COMMIT_SHA:-unknown}"
            echo "- Previous PyPI baseline: ${PREVIOUS_RELEASE_VERSION:-unknown}"
            echo
            if [ -f dist/router-release-regressions.md ]; then
              cat dist/router-release-regressions.md
            else
              echo "Benchmark regression report was not generated."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release candidate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-sbom.cdx.json
            dist/SHA256SUMS.txt
            dist/router-release.json
            dist/router-baseline.json
            dist/router-release-summary.md
            dist/router-release-regressions.md
            dist/memory-smoke.json
            dist/runtime-requirements.txt
            dist/release-benchmark-metadata.json
            dist/release-candidate-metadata.json
            dist/albucore-*-release-summary.md
          if-no-files-found: warn
