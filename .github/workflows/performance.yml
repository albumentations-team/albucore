name: Performance

on:
  workflow_dispatch:
    inputs:
      baseline_version:
        description: Optional PyPI release version to compare against
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  router-benchmark:
    name: Router benchmark comparison
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install current tree
        run: uv sync --frozen --extra headless --group dev

      - name: Resolve benchmark baseline version
        env:
          REQUESTED_BASELINE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.baseline_version || '' }}
        run: |
          if [ -n "${REQUESTED_BASELINE_VERSION}" ]; then
            echo "BASELINE_VERSION=${REQUESTED_BASELINE_VERSION}" >> "${GITHUB_ENV}"
            echo "Using requested baseline ${REQUESTED_BASELINE_VERSION}."
          else
            python tools/validate_release_candidate.py package-version > /tmp/albucore-version.env
            resolved="$(python tools/resolve_previous_pypi_release.py \
              --current-version "$(cat /tmp/albucore-version.env)")"
            echo "${resolved}"
            echo "BASELINE_VERSION=${resolved#PREVIOUS_RELEASE_VERSION=}" >> "${GITHUB_ENV}"
          fi

      - name: Run current router benchmark
        run: |
          mkdir -p benchmarks/results
          uv run python benchmarks/benchmark_router_synthetic.py \
            --with-geometric \
            --repeats 7 \
            --warmup 2 \
            --benchmark-label "current-${GITHUB_SHA}" \
            --output-json benchmarks/results/router-current.json

      - name: Run baseline router benchmark
        run: |
          uv run --no-project \
            --with "albucore==${BASELINE_VERSION}" \
            --with opencv-python-headless \
            --with numkong \
            --with stringzilla \
            --with numpy \
            python benchmarks/benchmark_router_synthetic.py \
              --with-geometric \
              --repeats 7 \
              --warmup 2 \
              --benchmark-label "baseline-${BASELINE_VERSION}" \
              --output-json benchmarks/results/router-baseline.json

      - name: Check benchmark regressions
        run: |
          uv run python tools/check_benchmark_regressions.py \
            --baseline benchmarks/results/router-baseline.json \
            --current benchmarks/results/router-current.json \
            --mode release \
            --output-md benchmarks/results/REPORT_router_regressions.md

      - name: Summarize current benchmark
        if: always()
        run: |
          if [ -f benchmarks/results/router-current.json ]; then
            uv run python tools/summarize_benchmarks.py \
              benchmarks/results/router-current.json \
              --output-md benchmarks/results/REPORT_router_current_summary.md
          fi

      - name: Run memory smoke
        if: always()
        run: |
          uv run python tools/run_memory_smoke.py \
            --output-json benchmarks/results/memory-smoke.json

      - name: Generate benchmark evidence metadata
        if: always()
        run: |
          python tools/validate_release_candidate.py benchmark-metadata \
            --output-json benchmarks/results/release-benchmark-metadata.json \
            --commit-sha "${GITHUB_SHA}" \
            --baseline-version "${BASELINE_VERSION:-}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-benchmark-evidence
          path: |
            benchmarks/results/router-current.json
            benchmarks/results/router-baseline.json
            benchmarks/results/REPORT_router_regressions.md
            benchmarks/results/REPORT_router_current_summary.md
            benchmarks/results/memory-smoke.json
            benchmarks/results/release-benchmark-metadata.json
          if-no-files-found: error
