name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_release_artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"
          activate-environment: true

      - name: Resolve release metadata from pyproject
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project = pyproject.get("project")
          if not isinstance(project, dict):
              raise SystemExit("pyproject.toml is missing [project] metadata required for releases.")

          package_version = project.get("version")
          if not isinstance(package_version, str) or not package_version:
              raise SystemExit("pyproject.toml is missing project.version required for releases.")

          release_tag = os.environ["RELEASE_TAG"]
          normalized_release_tag = release_tag.removeprefix("v")
          if normalized_release_tag != package_version:
              raise SystemExit(
                  f"Release tag '{release_tag}' does not match project.version '{package_version}'."
              )

          optional_dependencies = project.get("optional-dependencies", {})
          if not isinstance(optional_dependencies, dict):
              raise SystemExit("pyproject.toml project.optional-dependencies must be a table when present.")

          headless_dependencies = optional_dependencies.get("headless", [])
          if not isinstance(headless_dependencies, list):
              raise SystemExit("pyproject.toml project.optional-dependencies.headless must be an array.")

          print(f"PACKAGE_VERSION={package_version}")
          print(f"SBOM_FILENAME=albucore-{package_version}-sbom.cdx.json")
          print("HEADLESS_RUNTIME_DEPENDENCIES<<EOF")
          for dependency in headless_dependencies:
              print(dependency)
          print("EOF")
          PY

      - name: Build distributions
        run: uv build

      - name: Install release validation dependencies
        run: uv sync --extra headless --group dev

      - name: Check public router contracts
        run: uv run python tools/check_router_contracts.py

      - name: Check CI matrix policy
        run: uv run python tools/ci_matrix.py check

      - name: Verify golden vectors
        run: uv run python tools/verify_golden_vectors.py

      - name: Run release property tests
        run: uv run pytest tests/property --hypothesis-profile=release

      - name: Check distribution metadata
        run: uv tool run --from twine twine check dist/*

      - name: Smoke test built wheel
        run: |
          VENV_DIR="$(mktemp -d /tmp/albucore-release-venv.XXXXXX)"
          trap 'rm -rf "$VENV_DIR"' EXIT
          python -m venv "$VENV_DIR"
          . "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip
          if [ -n "${HEADLESS_RUNTIME_DEPENDENCIES:-}" ]; then
            printf '%s\n' "${HEADLESS_RUNTIME_DEPENDENCIES}" > "$VENV_DIR/headless-runtime-requirements.txt"
            python -m pip install -r "$VENV_DIR/headless-runtime-requirements.txt"
          fi
          python -m pip install dist/*.whl
          cd /tmp
          python - <<'PY'
          import albucore
          import numpy as np
          img = np.zeros((64, 64, 3), dtype=np.uint8)
          print("albucore smoke test passed, version:", albucore.__version__)
          PY

      - name: Verify uv.lock is up-to-date
        run: uv lock --check

      - name: Resolve previous release version
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPOSITORY']}/releases?per_page=100",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              releases = json.load(response)

          current_tag = os.environ["RELEASE_TAG"]
          previous = next(
              (
                  release
                  for release in releases
                  if not release.get("draft") and release.get("tag_name") != current_tag
              ),
              None,
          )
          if previous is None:
              raise SystemExit(f"No previous GitHub Release found before {current_tag}.")

          previous_tag = previous["tag_name"]
          print(f"PREVIOUS_RELEASE_TAG={previous_tag}")
          print(f"PREVIOUS_RELEASE_VERSION={previous_tag.removeprefix('v')}")
          PY

      - name: Run current release router benchmark
        run: |
          uv run python benchmarks/benchmark_router_synthetic.py \
            --quick \
            --with-geometric \
            --repeats 7 \
            --warmup 2 \
            --benchmark-label "release-${PACKAGE_VERSION}" \
            --output-json dist/router-release.json

      - name: Run previous release router benchmark baseline
        run: |
          uv run --no-project \
            --with "albucore==${PREVIOUS_RELEASE_VERSION}" \
            --with opencv-python-headless \
            --with numkong \
            --with stringzilla \
            --with numpy \
            python benchmarks/benchmark_router_synthetic.py \
              --quick \
              --with-geometric \
              --repeats 7 \
              --warmup 2 \
              --benchmark-label "baseline-${PREVIOUS_RELEASE_VERSION}" \
              --output-json dist/router-baseline.json

      - name: Check release benchmark regressions
        run: |
          uv run python tools/check_benchmark_regressions.py \
            --baseline dist/router-baseline.json \
            --current dist/router-release.json \
            --mode release \
            --output-md dist/router-release-regressions.md

      - name: Summarize release router benchmark
        run: |
          uv run python tools/summarize_benchmarks.py \
            dist/router-release.json \
            --output-md dist/router-release-summary.md

      - name: Run memory smoke
        run: uv run python tools/run_memory_smoke.py --output-json dist/memory-smoke.json

      - name: Export locked runtime dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file dist/runtime-requirements.txt

      - name: Generate CycloneDX SBOM
        run: |
          uv tool run --from cyclonedx-bom cyclonedx-py requirements dist/runtime-requirements.txt \
            --output-format JSON \
            --output-file "dist/${SBOM_FILENAME}"

      - name: Generate checksums
        run: |
          (
            cd dist
            sha256sum ./*.whl ./*.tar.gz ./*-sbom.cdx.json \
              ./router-release.json ./router-baseline.json ./router-release-regressions.md ./memory-smoke.json \
              > SHA256SUMS.txt
          )

      - name: Generate release summary
        run: |
          uv run python tools/generate_release_summary.py \
            --version "${PACKAGE_VERSION}" \
            --dist-dir dist \
            --output-md "dist/albucore-${PACKAGE_VERSION}-release-summary.md"

      - name: Upload distribution artifacts for PyPI
        uses: actions/upload-artifact@v4
        with:
          name: pypi-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-sbom.cdx.json
            dist/SHA256SUMS.txt
            dist/router-release.json
            dist/router-baseline.json
            dist/router-release-summary.md
            dist/router-release-regressions.md
            dist/memory-smoke.json
            dist/albucore-*-release-summary.md
          if-no-files-found: error

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*-sbom.cdx.json
            dist/SHA256SUMS.txt
            dist/router-release.json
            dist/router-baseline.json
            dist/router-release-summary.md
            dist/router-release-regressions.md
            dist/memory-smoke.json
            dist/albucore-*-release-summary.md
          fail_on_unmatched_files: true

  publish_to_pypi:
    runs-on: ubuntu-latest
    needs: build_release_artifacts
    environment: pypi
    permissions:
      id-token: write
      actions: read
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-distributions
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: true
